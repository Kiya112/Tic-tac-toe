<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="index.css"/>
    <script src="index.js" defer></script>
</head>
<body>

    <h1>TIC TAC TOE</h1><br><br>
    <P>WELLCOME PLAYER</P><br>
    <div class="button-container">
    <button id="singlePlayer">Single player</button>
    <button id="twoPlayer">Two player </button>
    </div>
    <br><br>
    <div class="score-board"> 
         <div class="playerx-score">
           <h6>Current player(X)</h6>
           <p id="playerxScore">0</p>
           </div>
           <div class="tie-board">
            <h6>Tie</h6>
            <p id="tie"> 0</p>
        </div>
        <div class="playero-score">
            <h6>player O</h6>
            <p id="playeroScore">0</p>

        </div>
    </div> 
    <br>
    <div class="game-board">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        </div>
        <br>
    <div class="btn-container">
        <button id="restartBtn"> Restart</button>
    </div>

</body>
</html>
